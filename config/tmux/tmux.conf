# --------------------#
#      Keybinds       #
# --------------------#

unbind C-b
set -g prefix C-SPACE
bind-key C-SPACE send-prefix

# pane resize
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# select a pane
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# select a pane without prefix
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# cycle windows
bind -n S-Left previous-window
bind -n S-Right next-window

# alt+number navigate windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# sessionizer
bind s run "tmux neww ~/.local/bin/session-finder.sh"

# reload config
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf \; display "Recargado malongo nwn!"

# vim style copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# --------------------#
#      Options        #
# --------------------#

set-option -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# enable Yazi's image preview to work correctly in tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g set-titles on
set -g set-titles-string "#T"

# Window title begins by 1 and not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g set-clipboard on

# --------------------#
#      Themes         #
# --------------------#

# Nord theme colors
thm_bg="#2e3440"       # Nord0 (Polar Night - Fondo principal)
thm_fg="#d8dee9"       # Nord4 (Snow Storm - Texto principal)
thm_cyan="#88c0d0"     # Nord8 (Frost - Cian/Azul claro)
thm_black="#242933"    # Nord0 más oscuro / Variante para fondos profundos
thm_gray="#3b4252"     # Nord1 (Polar Night - Estado/Líneas)
thm_magenta="#b48ead"  # Nord15 (Aurora - Magenta/Morado)
thm_pink="#b48ead"     # Nord (Nord no tiene rosa nativo, se usa el mismo Aurora de arriba)
thm_red="#bf616a"      # Nord11 (Aurora - Rojo)
thm_green="#a3be8c"    # Nord14 (Aurora - Verde)
thm_yellow="#ebcb8b"   # Nord13 (Aurora - Amarillo)
thm_blue="#81a1c1"     # Nord9 (Frost - Azul)
thm_orange="#d08770"   # Nord12 (Aurora - Naranja)
thm_black4="#4c566a"   # Nord3 (Polar Night - Gris brillante / Comentarios)

# Status bar
set-option -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-interval 2

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_magenta},bg=${thm_bg}](✓) #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Statusline - right side
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_gray}] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg=${thm_gray}]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_gray}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"

# im just listening to what neovim checkhealth has to say
# - ⚠️ WARNING `focus-events` is not enabled. |'autoread'| may not work.
set-option -g focus-events on
